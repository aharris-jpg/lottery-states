<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Where Americans Win the Lottery Most Often</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    :root{
      --bg:#07111F;
      --bgGlow:#0E2345;
      --cardTop:#0C1C36;
      --cardBottom:#081321;
      --ink:#F8FAFC;
      --muted:#AEB9CB;

      --border:#E9DFC6;
      --outline:rgba(255,255,255,0.24);

      --m0:#FBF4E2;
      --m1:#F2DEAC;
      --m2:#E6C56E;
      --m3:#D4A63A;
      --m4:#B8881F;
      --m5:#8C6512;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(circle at 50% 10%, var(--bgGlow) 0%, var(--bg) 60%),
        var(--bg);
      color:var(--ink);
      padding:24px 14px 28px;
    }

    .wrap{
      max-width:1120px;
      margin:0 auto;
    }

    .title{
      margin:0 0 14px;
      text-align:center;
      font-weight:950;
      font-size:clamp(28px,3.7vw,44px);
      line-height:1.02;
      letter-spacing:-0.04em;
      color:#fff;
      text-wrap:balance;
    }

    .card{
      background:linear-gradient(180deg,var(--cardTop) 0%, var(--cardBottom) 100%);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:20px;
      overflow:hidden;
      box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.04);
    }

    .map-wrap{
      padding:18px 18px 0;
    }

    svg{
      width:100%;
      height:auto;
      display:block;
    }

    .state{
      stroke:var(--border);
      stroke-width:3.4;
      stroke-linejoin:round;
      stroke-linecap:round;
    }

    .state-outline{
      fill:none;
      stroke:var(--outline);
      stroke-width:1.2;
      pointer-events:none;
    }

    .label{
      fill:#FFFFFF;
      font-weight:900;
      stroke:#050C18;
      stroke-width:4.5;
      paint-order:stroke;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      pointer-events:none;
      letter-spacing:-0.01em;
    }

    .legend{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:14px 16px;
      border-top:1px solid rgba(255,255,255,0.07);
      background:linear-gradient(180deg, rgba(255,255,255,0.012), rgba(255,255,255,0.008));
    }

    .legend span{
      font-size:12px;
      font-weight:850;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.05em;
      white-space:nowrap;
    }

    .legend .bar{
      width:min(470px, 72vw);
      height:14px;
      border-radius:999px;
      background:linear-gradient(90deg,var(--m0),var(--m1),var(--m2),var(--m3),var(--m4),var(--m5));
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.2),
        0 0 10px rgba(212,166,58,.25);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
      padding:14px 16px 18px;
      border-top:1px solid rgba(255,255,255,0.07);
      background:linear-gradient(180deg, rgba(255,255,255,0.008), rgba(255,255,255,0.012));
    }

    .note{
      max-width:650px;
      font-size:12px;
      line-height:1.42;
      color:var(--muted);
      font-weight:700;
    }

    .note b{
      color:#fff;
    }

    .brand{
      text-align:right;
      flex:0 0 auto;
    }

    .credit{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:7px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .brand img{
      height:36px;
      display:block;
    }

    @media (max-width: 820px){
      .map-wrap{ padding:14px 14px 0; }
      .state{ stroke-width:2.8; }
      .label{ stroke-width:4.0; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 class="title">Where Americans Win the Lottery Most Often</h1>

    <div class="card">
      <div class="map-wrap">
        <svg id="map" viewBox="0 0 975 610" aria-label="Where Americans Win the Lottery Most Often map"></svg>
      </div>

      <div class="legend">
        <span>Lower Frequency</span>
        <div class="bar" aria-hidden="true"></div>
        <span>Higher Frequency</span>
      </div>

      <div class="footer">
        <div class="note">
          <b>Read it:</b> Darker states produce jackpot winners more frequently.<br>
          Source: Powerball, Mega Millions, U.S. Census, Vegas Insider analysis.
        </div>

        <div class="brand">
          <div class="credit">Created by: VegasInsider.com</div>
          <img src="https://i.postimg.cc/bY4sNQnk/logo.jpg" alt="Vegas Insider" referrerpolicy="no-referrer">
        </div>
      </div>
    </div>
  </div>

  <script>
    const data = {
      "Michigan":85.5,"Virginia":82.4,"New York":79.8,"California":59.2,"Maryland":55.4,
      "Iowa":52.2,"Massachusetts":50.7,"New Jersey":41.6,"Rhode Island":41.6,"Missouri":38.4,
      "Arkansas":36.6,"Kentucky":33.7,"North Carolina":33.6,"Delaware":32.8,"Nebraska":30.6,
      "Kansas":30.2,"North Dakota":29.0,"Oregon":25.7,"Illinois":24.6,"New Mexico":23.5,
      "West Virginia":20.4,"Mississippi":20.1,"Wisconsin":20.0,"South Carolina":20.0,"Tennessee":19.5,
      "Connecticut":18.5,"Florida":18.4,"Ohio":18.2,"Oklahoma":18.2,"Minnesota":17.9,
      "Vermont":17.7,"New Hampshire":16.9,"Indiana":15.8,"Louisiana":15.7,"Pennsylvania":15.6,
      "Idaho":12.1,"Arizona":10.9,"Washington":9.1,"Texas":8.9,"Georgia":8.7,
      "Maine":8.6,"Colorado":8.1
    };

    const top5 = ["Michigan","Virginia","New York","California","Maryland"];

    const rankLabels = {
      "Michigan":"#1 Michigan",
      "Virginia":"#2 Virginia",
      "New York":"#3 New York",
      "California":"#4 California",
      "Maryland":"#5 Maryland"
    };

    const labelPositions = {
      "California": { dx:-12, dy:8, anchor:"middle" },
      "Michigan":   { dx:10,  dy:2, anchor:"middle" },
      "Virginia":   { dx:34,  dy:24, anchor:"middle" },
      "Maryland":   { dx:44,  dy:6, anchor:"middle" },
      "New York":   { dx:0,   dy:6, anchor:"middle" }
    };

    const ramp = ["#FBF4E2","#F2DEAC","#E6C56E","#D4A63A","#B8881F","#8C6512"];

    const color = d3.scaleQuantile()
      .domain(Object.values(data))
      .range(ramp);

    const svg = d3.select("#map");
    const projection = d3.geoAlbersUsa().scale(1300).translate([487,305]);
    const path = d3.geoPath(projection);

    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
      const states = topojson.feature(us, us.objects.states).features;
      const topStates = states.filter(d => top5.includes(d.properties.name));

      svg.selectAll("path.state")
        .data(states)
        .join("path")
        .attr("class","state")
        .attr("d", path)
        .attr("fill", d => {
          const val = data[d.properties.name];
          return val ? color(val) : "#FBF4E2";
        });

      svg.append("path")
        .datum(topojson.mesh(us, us.objects.states, (a,b)=>a!==b))
        .attr("class","state-outline")
        .attr("d", path);

      svg.append("g")
        .selectAll("text")
        .data(topStates)
        .join("text")
        .attr("class","label")
        .text(d => rankLabels[d.properties.name])
        .attr("x", d => {
          const c = path.centroid(d);
          const p = labelPositions[d.properties.name] || {dx:0,dy:0};
          return c[0] + p.dx;
        })
        .attr("y", d => {
          const c = path.centroid(d);
          const p = labelPositions[d.properties.name] || {dx:0,dy:0};
          return c[1] + p.dy;
        })
        .attr("text-anchor", d => (labelPositions[d.properties.name]?.anchor || "middle"))
        .attr("font-size", d => d.properties.name === "Maryland" ? 10.2 : 11.8);
    });
  </script>
</body>
</html>
