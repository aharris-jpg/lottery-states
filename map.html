<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Where Americans Win the Lottery Most Often</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>
:root{
  --bg:#F5F7FA;
  --ink:#0F172A;
  --muted:#64748B;

  --border:#D1D9E6;
  --outline:#94A3B8;

  --m0:#E9EEF6;
  --m1:#AFC4E8;
  --m2:#5B86E5;
  --m3:#E7B94C;
  --m4:#C9971A;
  --m5:#8A6500;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  padding:20px;
}

.wrap{
  max-width:1100px;
  margin:auto;
}

h1{
  text-align:center;
  font-weight:900;
  font-size:36px;
  margin-bottom:14px;
  line-height:1.1;
}

.card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  overflow:hidden;
}

.map-wrap{
  padding:16px;
}

svg{
  width:100%;
  height:auto;
  display:block;
}

.state{
  stroke:var(--border);
  stroke-width:4.5;
  stroke-linejoin:round;
  stroke-linecap:round;
}

.state-outline{
  fill:none;
  stroke:var(--outline);
  stroke-width:1.2;
  pointer-events:none;
}

.label{
  fill:#111;
  font-weight:900;
  stroke:#fff;
  stroke-width:4;
  paint-order:stroke;
  font-size:12px;
  pointer-events:none;
}

.legend{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:14px;
  border-top:1px solid #eee;
}

.legend span{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
}

.bar{
  width:420px;
  height:12px;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    var(--m0),
    var(--m1),
    var(--m2),
    var(--m3),
    var(--m4),
    var(--m5)
  );
}

.footer{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:12px;
  flex-wrap:wrap;
  padding:12px 16px;
  font-size:12px;
  color:var(--muted);
  border-top:1px solid #eee;
}

.footer b{
  color:#334155;
}

.brand img{
  height:34px;
  display:block;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>These States Produce the Most Lottery Winners</h1>

  <div class="card">
    <div class="map-wrap">
      <svg id="map" viewBox="0 0 975 610" aria-label="Where Americans Win the Lottery Most Often map"></svg>
    </div>

    <div class="legend">
      <span>Fewer Wins</span>
      <div class="bar"></div>
      <span>More Wins</span>
    </div>

    <div class="footer">
      <div>
        <b>Read it:</b> Darker states produce jackpot winners more frequently.<br>
        Source: Powerball, Mega Millions, U.S. Census, Vegas Insider analysis.
      </div>

      <div class="brand">
        <img src="https://i.postimg.cc/T2qmfTjh/vegas-insider-logo.jpg" alt="Vegas Insider logo" referrerpolicy="no-referrer">
      </div>
    </div>
  </div>
</div>

<script>
const data = {
  "Michigan":85.5,"Virginia":82.4,"New York":79.8,"California":59.2,"Maryland":55.4,
  "Iowa":52.2,"Massachusetts":50.7,"New Jersey":41.6,"Rhode Island":41.6,"Missouri":38.4,
  "Arkansas":36.6,"Kentucky":33.7,"North Carolina":33.6,"Delaware":32.8,"Nebraska":30.6,
  "Kansas":30.2,"North Dakota":29.0,"Oregon":25.7,"Illinois":24.6,"New Mexico":23.5,
  "West Virginia":20.4,"Mississippi":20.1,"Wisconsin":20.0,"South Carolina":20.0,"Tennessee":19.5,
  "Connecticut":18.5,"Florida":18.4,"Ohio":18.2,"Oklahoma":18.2,"Minnesota":17.9,
  "Vermont":17.7,"New Hampshire":16.9,"Indiana":15.8,"Louisiana":15.7,"Pennsylvania":15.6,
  "Idaho":12.1,"Arizona":10.9,"Washington":9.1,"Texas":8.9,"Georgia":8.7,
  "Maine":8.6,"Colorado":8.1
};

const top5 = ["Michigan","Virginia","New York","California","Maryland"];

const labels = {
  "Michigan":"#1 Michigan",
  "Virginia":"#2 Virginia",
  "New York":"#3 New York",
  "California":"#4 California",
  "Maryland":"#5 Maryland"
};

const labelPositions = {
  "California": { dx:-10, dy:8 },
  "Michigan":   { dx:10, dy:2 },
  "Virginia":   { dx:34, dy:24 },
  "Maryland":   { dx:44, dy:6 },
  "New York":   { dx:0, dy:6 }
};

const ramp = [
  "#E9EEF6","#AFC4E8","#5B86E5",
  "#E7B94C","#C9971A","#8A6500"
];

const color = d3.scaleQuantile()
  .domain(Object.values(data))
  .range(ramp);

const svg = d3.select("#map");
const projection = d3.geoAlbersUsa().scale(1300).translate([487,305]);
const path = d3.geoPath(projection);

d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(us => {
  const states = topojson.feature(us, us.objects.states).features;

  svg.selectAll("path.state")
    .data(states)
    .join("path")
    .attr("class","state")
    .attr("d", path)
    .attr("fill", d => data[d.properties.name] ? color(data[d.properties.name]) : "#E5E7EB");

  svg.append("path")
    .datum(topojson.mesh(us, us.objects.states, (a,b)=>a!==b))
    .attr("class","state-outline")
    .attr("d", path);

  svg.selectAll("text.label")
    .data(states.filter(d => top5.includes(d.properties.name)))
    .join("text")
    .attr("class","label")
    .text(d => labels[d.properties.name])
    .attr("x", d => path.centroid(d)[0] + (labelPositions[d.properties.name]?.dx || 0))
    .attr("y", d => path.centroid(d)[1] + (labelPositions[d.properties.name]?.dy || 0))
    .attr("text-anchor","middle");
});
</script>

</body>
</html>
